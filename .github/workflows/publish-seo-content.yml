name: Publish SEO Content

on:
  push:
    branches: ['main']
    paths:
      - 'content/**'
      - 'src/**'
      - 'scripts/**'
      - 'product/seo/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build logs context
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: seo-publish-context
          path: |
            product/seo/generated

      - name: Vercel deploy placeholder
        run: echo "Add Vercel deploy integration step here (project-specific token/project id)."
