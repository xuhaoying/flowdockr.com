name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Validate pricing content
        run: pnpm qa:pricing-content

      - name: Validate pricing taxonomy
        run: pnpm qa:pricing-taxonomy

      - name: Build
        run: pnpm build

      - name: Runtime smoke (pricing cluster)
        run: pnpm qa:pricing-runtime-smoke
